services:
  - type: web
    name: careergenie-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: GROQ_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
